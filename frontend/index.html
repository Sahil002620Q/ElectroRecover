<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronics Recovery Marketplace</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#7c3aed', // Violet 600
                        'primary-dark': '#6d28d9', // Violet 700
                        'primary-light': '#8b5cf6', // Violet 500
                        secondary: '#475569',
                        dark: {
                            bg: '#000000',
                            panel: '#111111',
                            text: '#ffffff',
                            sub: '#a1a1aa'
                        }
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.dark {
            background-color: #000000;
            color: #ffffff;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .dark .glass-panel {
            background: rgba(17, 17, 17, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-animated {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-animated:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(124, 58, 237, 0.5);
        }

        .btn-animated:active {
            transform: translateY(0);
        }

        /* Dark mode overrides for common components */
        .dark .text-slate-600 { color: #a1a1aa; }
        .dark .text-slate-700 { color: #d4d4d8; }
        .dark .text-slate-800 { color: #f4f4f5; }
        .dark .text-slate-900 { color: #ffffff; }
        .dark .bg-white { background-color: #111111; }
        .dark .bg-gray-50 { background-color: #000000; }
        .dark .bg-slate-50 { background-color: #111111; }
        .dark .bg-slate-100 { background-color: #18181b; }
        .dark .border-slate-100, .dark .border-slate-200, .dark .border-gray-200 { border-color: rgba(255,255,255,0.1); }
        .dark input, .dark select, .dark textarea {
            background-color: #18181b !important;
            color: #ffffff !important;
            border-color: rgba(255,255,255,0.2) !important;
        }
        .dark .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.5); }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen text-slate-900">
    <div id="root"></div>

    <!-- Main Application Logic -->
    <script type="text/babel" src="/static/app.js"></script>
</body>

</html>
